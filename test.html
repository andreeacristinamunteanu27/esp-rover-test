<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Test ESP‑Rover</title>
<style>
    body {
        background: #0d0d0d;
        color: #e6e6e6;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 40px;
    }
    h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #00c8ff;
    }
    .question {
        background: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        border: 1px solid #333;
    }
    button {
        background: #00c8ff;
        color: #000;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        display: block;
        margin: 20px auto;
    }
    button:hover {
        background: #33d6ff;
    }
    #result {
        text-align: center;
        font-size: 22px;
        margin-top: 30px;
        color: #00ff99;
    }
</style>
</head>
<body>

<h1>Test ESP‑Rover</h1>

<div id="quiz"></div>

<button onclick="checkAnswers()">Verifică răspunsurile</button>

<div id="result"></div>

<script>
const questions = [
    {
        q: "Ce rol are TTGO T‑Display?",
        a: ["Controlează motoarele", "Afișează date și rulează ESP32", "Detectează obstacole"],
        c: 1
    },
    {
        q: "Ce face modulul L298N?",
        a: ["Controlează motoarele DC", "Măsoară temperatura", "Trimite date prin WiFi"],
        c: 0
    },
    {
        q: "Ce tip de senzor este Sharp GP2Y10?",
        a: ["Senzor de praf", "Senzor de gaz", "Senzor de presiune"],
        c: 0
    },
    {
        q: "Ce protocol folosește robotul pentru control?",
        a: ["WiFi", "BLE", "IR"],
        c: 1
    },
    {
        q: "Ce măsoară BMP180?",
        a: ["Gaz", "Presiune și temperatură", "Distanță"],
        c: 1
    },
    {
        q: "Ce face senzorul MQ?",
        a: ["Detectează gaz", "Măsoară altitudinea", "Controlează motoarele"],
        c: 0
    },
    {
        q: "Cum trimite robotul datele către aplicație?",
        a: ["Prin BLE", "Prin WiFi", "Prin USB"],
        c: 1
    }
];

function loadQuiz() {
    const quiz = document.getElementById("quiz");
    quiz.innerHTML = "";

    const selected = questions.sort(() => 0.5 - Math.random()).slice(0, 5);

    selected.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "question";

        let html = `<p><strong>${index + 1}. ${item.q}</strong></p>`;
        item.a.forEach((ans, i) => {
            html += `
                <label>
                    <input type="radio" name="q${index}" value="${i}">
                    ${ans}
                </label><br>
            `;
        });

        div.innerHTML = html;
        quiz.appendChild(div);
    });

    window.selectedQuestions = selected;
}

function checkAnswers() {
    let score = 0;

    window.selectedQuestions.forEach((item, index) => {
        const radios = document.getElementsByName("q" + index);
        radios.forEach(r => {
            if (r.checked && parseInt(r.value) === item.c) {
                score++;
            }
        });
    });

    document.getElementById("result").innerHTML =
        `Ai obținut <strong>${score}/5</strong> răspunsuri corecte!`;
}

loadQuiz();
</script>

</body>
</html>
