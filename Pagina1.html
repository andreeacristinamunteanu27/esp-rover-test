<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Întrebarea 2</title>
<style>
  body { background:#111; color:white; font-family:Arial; padding:20px; }
  .card { background:#1e1e1e; padding:20px; border-radius:10px; max-width:600px; margin:auto; }
  label { display:block; margin:10px 0; }
  button { padding:10px 20px; background:#4CAF50; border:none; border-radius:8px; color:white; cursor:pointer; }
</style>
</head>
<body>

<div class="card">
  <h2>2. Ce face modulul L298N?</h2>

  <form action="Pagina3.html" method="get" onsubmit="return saveAnswer()">
    <label><input type="radio" name="r" value="0"> Controlează motoarele DC</label>
    <label><input type="radio" name="r" value="1"> Măsoară temperatura</label>
    <label><input type="radio" name="r" value="2"> Trimite date prin WiFi</label>

    <button type="submit">Următoarea</button>
  </form>
</div>

<script>
function saveAnswer() {
  const val = document.querySelector('input[name="r"]:checked');
  if (!val) { alert("Alege un răspuns!"); return false; }
  localStorage.setItem("q2", val.value);
  return true;
}
</script>

</body>
</html>
