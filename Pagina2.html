<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Întrebarea 3</title>
<style>
  body { background:#111; color:white; font-family:Arial; padding:20px; }
  .card { background:#1e1e1e; padding:20px; border-radius:10px; max-width:600px; margin:auto; }
  label { display:block; margin:10px 0; }
  button { padding:10px 20px; background:#4CAF50; border:none; border-radius:8px; color:white; cursor:pointer; }
</style>
</head>
<body>

<div class="card">
  <h2>3. Ce măsoară senzorul GP2Y10?</h2>

  <form action="PaginaFinala.html" method="get" onsubmit="return saveAnswer()">
    <label><input type="radio" name="r" value="0"> Praful din aer</label>
    <label><input type="radio" name="r" value="1"> Sunetul</label>
    <label><input type="radio" name="r" value="2"> Lumina</label>

    <button type="submit">Vezi rezultatul</button>
  </form>
</div>

<script>
function saveAnswer() {
  const val = document.querySelector('input[name="r"]:checked');
  if (!val) { alert("Alege un răspuns!"); return false; }
  localStorage.setItem("q3", val.value);
  return true;
}
</script>

</body>
</html>
