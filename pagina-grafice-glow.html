<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Grafice Live ESP‑Rover</title>

<style>
  /* ======= STIL GENERAL ======= */
  body {
    background: #f5faff; /* fundal alb-albastru deschis */
    color: #003049;      /* text albastru închis */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  /* ======= HEADER ======= */
  .header {
    text-align: center;
    padding: 40px 20px;
    background: white;
    border-bottom: 4px solid #2ecc71; /* verde */
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }

  .header h1 {
    color: #0077b6; /* albastru curat */
    font-size: 36px;
    margin-bottom: 10px;
  }

  .header p {
    color: #003049;
    font-size: 18px;
    margin-top: 0;
  }


  /* ======= GRID CU 2 GRAFICE PE RÂND ======= */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
  }

  /* ======= CARD PENTRU FIECARE GRAFIC ======= */
  .card {
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-left: 6px solid #2ecc71; /* verde */
  }

  .card h2 {
    margin-top: 0;
    color: #2ecc71;
    font-size: 20px;
    text-align: center;
  }

  /* ======= IFRAME GRAFICE ======= */
  iframe {
    width: 100%;
    height: 300px;
    border: none;
    border-radius: 10px;
  }
</style>
</head>

<body>

<div class="header">
  <h1>Grafice Live ESP‑Rover</h1>
  <p>Monitorizare în timp real pentru senzorii MQ, temperatură, presiune și altitudine.</p>
</div>

<!-- ======= GRID CU 2 GRAFICE PE RÂND ======= -->
<div class="grid">

  <!-- ======= CARD 1 ======= -->
  <div class="card">
    <h2>MQ Gas</h2>
    <!-- Grafic MQ Gas -->
    <iframe src="https://thingspeak.com/channels/3407336/charts/1?bgcolor=%23ffffff&color=%230077b6&dynamic=true&type=line&gridcolor=%23cccccc&axescolor=%23003049&linewidth=2"></iframe>
  </div>

  <!-- ======= CARD 2 ======= -->
  <div class="card">
    <h2>Temperatură BMP180</h2>
    <!-- Grafic temperatură -->
    <iframe src="https://thingspeak.com/channels/3407336/charts/2?bgcolor=%23ffffff&color=%232ecc71&dynamic=true&type=line&gridcolor=%23cccccc&axescolor=%23003049&linewidth=2"></iframe>
  </div>

  <!-- ======= CARD 3 ======= -->
  <div class="card">
    <h2>Presiune BMP180</h2>
    <!-- Grafic presiune -->
    <iframe src="https://thingspeak.com/channels/3407336/charts/3?bgcolor=%23ffffff&color=%230077b6&dynamic=true&type=line&gridcolor=%23cccccc&axescolor=%23003049&linewidth=2"></iframe>
  </div>

  <!-- ======= CARD 4 ======= -->
  <div class="card">
    <h2>Altitudine BMP180</h2>
    <!-- Grafic altitudine -->
    <iframe src="https://thingspeak.com/channels/3407336/charts/4?bgcolor=%23ffffff&color=%232ecc71&dynamic=true&type=line&gridcolor=%23cccccc&axescolor=%23003049&linewidth=2"></iframe>
  </div>

</div>

</body>
</html>
