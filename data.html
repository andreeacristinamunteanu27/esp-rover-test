<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Date ESP‑Rover</title>

<style>
  /* ======= STIL GENERAL PAGINĂ ======= */
  body {
    background: #f5faff; /* fundal alb-albastru */
    color: #003049; /* text albastru închis */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #0077b6; /* albastru curat */
    font-size: 32px;
    margin-bottom: 30px;
  }

  /* ======= CARD CENTRAL ======= */
  .card {
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-left: 6px solid #2ecc71; /* verde */
  }

  /* ======= BARA DE CONTROALE (căutare + filtrare) ======= */
  .controls {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  /* ======= TABEL ======= */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th {
    background: #0077b6; /* albastru */
    color: white;
    padding: 12px;
    cursor: pointer; /* indică sortare */
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #e6e6e6;
  }

  tr:hover {
    background: #e8f8ff; /* highlight albastru deschis */
  }

  /* ======= STATISTICI ======= */
  .stats {
    margin-top: 20px;
    padding: 15px;
    background: #e8fff1;
    border-left: 4px solid #2ecc71;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>Date brute ESP‑Rover</h1>

<div class="card">

  <!-- ======= CONTROALE: CĂUTARE + FILTRARE ======= -->
  <div class="controls">
    <input type="text" id="search" placeholder="Caută în tabel...">
    <input type="date" id="filter-date">
  </div>

  <!-- ======= TABEL ======= -->
  <table id="data-table">
    <thead>
      <tr>
        <th data-col="time">Timp</th>
        <th data-col="mq">MQ Gas</th>
        <th data-col="temp">Temperatură</th>
        <th data-col="pres">Presiune</th>
        <th data-col="alt">Altitudine</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <!-- ======= STATISTICI ======= -->
  <div class="stats" id="stats-box">
    Se calculează statisticile...
  </div>

</div>

<script>
/* ============================================================
   1. CITIREA DATELOR DIN THINGSPEAK (JSON)
   ============================================================ */
fetch("https://api.thingspeak.com/channels/3407336/feeds.json?results=8000")
  .then(response => response.json())
  .then(data => {
    const tbody = document.getElementById("table-body");
    const statsBox = document.getElementById("stats-box");

    let valuesMQ = [];
    let valuesTemp = [];
    let valuesPres = [];
    let valuesAlt = [];

    /* ============================================================
       2. CONSTRUIREA TABELULUI DIN DATE
       ============================================================ */
    data.feeds.forEach(entry => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${entry.created_at.replace("T", " ").replace("Z", "")}</td>
        <td>${entry.field1 || "-"}</td>
        <td>${entry.field2 || "-"}</td>
        <td>${entry.field3 || "-"}</td>
        <td>${entry.field4 || "-"}</td>
      `;

      tbody.appendChild(row);

      // colectăm valori pentru statistici
      if (entry.field1) valuesMQ.push(parseFloat(entry.field1));
      if (entry.field2) valuesTemp.push(parseFloat(entry.field2));
      if (entry.field3) valuesPres.push(parseFloat(entry.field3));
      if (entry.field4) valuesAlt.push(parseFloat(entry.field4));
    });

    /* ============================================================
       3. CALCULAREA STATISTICILOR (min, max, medie)
       ============================================================ */
    function calcStats(arr) {
      if (arr.length === 0) return "-";
      const min = Math.min(...arr);
      const max = Math.max(...arr);
      const avg = (arr.reduce((a,b)=>a+b,0) / arr.length).toFixed(2);
      return `min: ${min} | max: ${max} | medie: ${avg}`;
    }

    statsBox.innerHTML = `
      <b>Statistici:</b><br><br>
      MQ Gas → ${calcStats(valuesMQ)}<br>
      Temperatură → ${calcStats(valuesTemp)}<br>
      Presiune → ${calcStats(valuesPres)}<br>
      Altitudine → ${calcStats(valuesAlt)}
    `;
  });

/* ============================================================
   4. CĂUTARE ÎN TABEL
   ============================================================ */
document.getElementById("search").addEventListener("input", function() {
  const filter = this.value.toLowerCase();
  const rows = document.querySelectorAll("#data-table tbody tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});

/* ============================================================
   5. FILTRARE DUPĂ DATĂ
   ============================================================ */
document.getElementById("filter-date").addEventListener("change", function() {
  const selected = this.value;
  const rows = document.querySelectorAll("#data-table tbody tr");

  rows.forEach(row => {
    const time = row.children[0].innerText.substring(0, 10);
    row.style.display = (time === selected) ? "" : "none";
  });
});

/* ============================================================
   6. SORTARE PE COLOANE
   ============================================================ */
document.querySelectorAll("th").forEach(th => {
  th.addEventListener("click", () => {
    const table = th.closest("table");
    const tbody = table.querySelector("tbody");
    const rows = Array.from(tbody.querySelectorAll("tr"));
    const index = Array.from(th.parentNode.children).indexOf(th);

    const sorted = rows.sort((a, b) => {
      const A = a.children[index].innerText;
      const B = b.children[index].innerText;
      return A.localeCompare(B, undefined, {numeric: true});
    });

    tbody.innerHTML = "";
    sorted.forEach(r => tbody.appendChild(r));
  });
});
</script>

</body>
</html>
