<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Date ESP‑Rover</title>

<style>
  /* ======= STIL GENERAL ======= */
  body {
    background: #f5faff;
    color: #003049;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #0077b6;
    font-size: 32px;
    margin-bottom: 30px;
  }

  /* ======= CARD CENTRAL ======= */
  .card {
    max-width: 1200px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    border-left: 6px solid #2ecc71;
  }

  /* ======= CONTROALE ======= */
  .controls {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  button {
    background: #2ecc71;
    color: white;
    cursor: pointer;
    border: none;
  }

  button:hover {
    background: #27ae60;
  }

  /* ======= TABEL ======= */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }

  th {
    background: #0077b6;
    color: white;
    padding: 12px;
    cursor: pointer;
  }

  td {
    padding: 10px;
    border-bottom: 1px solid #e6e6e6;
  }

  tr:hover {
    background: #e8f8ff;
  }

  /* ======= PAGINARE ======= */
  .pagination {
    margin-top: 20px;
    text-align: center;
  }

  .pagination button {
    margin: 5px;
  }

  /* ======= STATISTICI ======= */
  .stats {
    margin-top: 20px;
    padding: 15px;
    background: #e8fff1;
    border-left: 4px solid #2ecc71;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>Date brute ESP‑Rover</h1>

<div class="card">

  <!-- ======= CONTROALE: CĂUTARE + FILTRARE + EXPORT ======= -->
  <div class="controls">
    <input type="text" id="search" placeholder="Caută în tabel...">
    <input type="date" id="filter-date">
    <button id="exportCSV">Export CSV</button>
  </div>

  <!-- ======= TABEL ======= -->
  <table id="data-table">
    <thead>
      <tr>
        <th data-col="time">Timp</th>
        <th data-col="mq">MQ Gas</th>
        <th data-col="temp">Temperatură</th>
        <th data-col="pres">Presiune</th>
        <th data-col="alt">Altitudine</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

  <!-- ======= PAGINARE ======= -->
  <div class="pagination" id="pagination"></div>

  <!-- ======= STATISTICI ======= -->
  <div class="stats" id="stats-box">
    Se calculează statisticile...
  </div>

</div>

<script>
/* ============================================================
   1. VARIABILE GLOBALE
   ============================================================ */
let allData = [];        // toate rândurile brute
let filteredData = [];   // date filtrate (căutare + dată)
let currentPage = 1;     // pagina curentă
const rowsPerPage = 50;  // 50 rânduri pe pagină

/* ============================================================
   2. CITIREA DATELOR DIN THINGSPEAK
   ============================================================ */
fetch("https://api.thingspeak.com/channels/3407336/feeds.json?results=8000")
  .then(response => response.json())
  .then(data => {
    // transformăm datele în format simplu
    allData = data.feeds.map(entry => ({
      time: entry.created_at.replace("T", " ").replace("Z", ""),
      mq: entry.field1 || "-",
      temp: entry.field2 || "-",
      pres: entry.field3 || "-",
      alt: entry.field4 || "-"
    }));

    filteredData = [...allData]; // inițial, toate datele

    renderTable();
    renderPagination();
    calcStats();
  });

/* ============================================================
   3. AFIȘAREA TABELULUI (cu paginare)
   ============================================================ */
function renderTable() {
  const tbody = document.getElementById("table-body");
  tbody.innerHTML = "";

  // calculăm indexul de start și final pentru pagina curentă
  const start = (currentPage - 1) * rowsPerPage;
  const end = start + rowsPerPage;

  const pageData = filteredData.slice(start, end);

  pageData.forEach(row => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.time}</td>
      <td>${row.mq}</td>
      <td>${row.temp}</td>
      <td>${row.pres}</td>
      <td>${row.alt}</td>
    `;
    tbody.appendChild(tr);
  });
}

/* ============================================================
   4. PAGINARE
   ============================================================ */
function renderPagination() {
  const totalPages = Math.ceil(filteredData.length / rowsPerPage);
  const pag = document.getElementById("pagination");
  pag.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => {
      currentPage = i;
      renderTable();
    };
    pag.appendChild(btn);
  }
}

/* ============================================================
   5. CĂUTARE ÎN TABEL
   ============================================================ */
document.getElementById("search").addEventListener("input", function() {
  const text = this.value.toLowerCase();
  filteredData = allData.filter(row =>
    Object.values(row).some(val => val.toLowerCase().includes(text))
  );
  currentPage = 1;
  renderTable();
  renderPagination();
});

/* ============================================================
   6. FILTRARE DUPĂ DATĂ
   ============================================================ */
document.getElementById("filter-date").addEventListener("change", function() {
  const date = this.value;
  filteredData = allData.filter(row => row.time.startsWith(date));
  currentPage = 1;
  renderTable();
  renderPagination();
});

/* ============================================================
   7. EXPORT CSV
   ============================================================ */
document.getElementById("exportCSV").addEventListener("click", function() {
  let csv = "Timp,MQ Gas,Temperatură,Presiune,Altitudine\n";

  filteredData.forEach(row => {
    csv += `${row.time},${row.mq},${row.temp},${row.pres},${row.alt}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "esp-rover-data.csv";
  a.click();
});

/* ============================================================
   8. STATISTICI
   ============================================================ */
function calcStats() {
  const statsBox = document.getElementById("stats-box");

  function stats(arr) {
    arr = arr.filter(v => !isNaN(v));
    if (arr.length === 0) return "-";
    const min = Math.min(...arr);
    const max = Math.max(...arr);
    const avg = (arr.reduce((a,b)=>a+b,0) / arr.length).toFixed(2);
    return `min: ${min} | max: ${max} | medie: ${avg}`;
  }

  statsBox.innerHTML = `
    <b>Statistici:</b><br><br>
    MQ Gas → ${stats(allData.map(r => parseFloat(r.mq)))}<br>
    Temperatură → ${stats(allData.map(r => parseFloat(r.temp)))}<br>
    Presiune → ${stats(allData.map(r => parseFloat(r.pres)))}<br>
    Altitudine → ${stats(allData.map(r => parseFloat(r.alt)))}
  `;
}
</script>

</body>
</html>
