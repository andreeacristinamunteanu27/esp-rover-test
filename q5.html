<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Întrebarea 5</title>

<style>
  body { background:#f5faff; color:#003049; font-family:Arial; padding:40px; }
  h2 { color:#0077b6; }
  .card { background:white; padding:20px; border-radius:14px; max-width:700px; margin:auto;
          box-shadow:0 4px 20px rgba(0,0,0,0.08); border-left:6px solid #2ecc71; }
  .btn { background:#2ecc71; color:white; padding:12px 22px; border-radius:10px;
         text-decoration:none; font-weight:bold; display:inline-block; margin-top:20px; }
  .btn:hover { background:#27ae60; }
</style>
</head>

<body>

<div class="card">
  <h2>5. Ce este ThingSpeak?</h2>

  <form onsubmit="saveAnswer(event, 'final.html')">
    <label><input type="radio" name="q5" value="1"> O platformă cloud pentru date IoT</label><br><br>
    <label><input type="radio" name="q5" value="0"> Un senzor de gaz</label><br><br>
    <label><input type="radio" name="q5" value="0"> Un motor</label><br><br>

    <button class="btn">Finalizează testul</button>
  </form>
</div>

<script>
function saveAnswer(event, nextPage) {
  event.preventDefault();
  const selected = document.querySelector('input[type="radio"]:checked');
  if (!selected) { alert("Selectează un răspuns!"); return; }
  if (selected.value === "1") {
    let score = localStorage.getItem("score") || 0;
    localStorage.setItem("score", Number(score) + 1);
  }
  window.location.href = nextPage;
}
</script>

</body>
</html>
